name: Smoke

# Post-deploy smoke tests against the live production URL. Runs after the
# "Deploy to Cloudflare" workflow completes successfully, so it tests the version
# that was just deployed. workflow_dispatch allows an ad-hoc run against any URL.
on:
  workflow_run:
    workflows: ["Deploy to Cloudflare"]
    types: [completed]
  workflow_dispatch:
    inputs:
      url:
        description: Production URL to smoke-test
        required: false
        default: https://www.updatewave.org

jobs:
  smoke:
    name: smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Manual runs always proceed. Automatic runs only after a SUCCESSFUL deploy.
    if: >-
      ${{ github.event_name == 'workflow_dispatch' ||
          github.event.workflow_run.conclusion == 'success' }}
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Post-deploy smoke tests
        run: npx playwright test --project=smoke
        env:
          # Smoke the public production URL (custom domain on Cloudflare).
          PRODUCTION_URL: ${{ inputs.url || 'https://www.updatewave.org' }}
