name: Smoke

# Post-deploy smoke tests. Runs AFTER a deployment reports success, against the
# URL that was actually deployed - replacing the previous "smoke right after
# push" job that could race ahead of the Vercel deploy and test the old version.
#
# This depends on Vercel's GitHub integration emitting `deployment_status`
# events (its standard Git integration does). If you don't see this workflow run
# after a deploy, trigger it manually via "Run workflow" (workflow_dispatch) and
# check the deployment environment label below.
on:
  deployment_status:
  workflow_dispatch:
    inputs:
      url:
        description: Production URL to smoke-test
        required: false
        default: https://www.updatewave.org

jobs:
  smoke:
    name: smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Manual runs always proceed. Automatic runs only for a SUCCESSFUL production
    # deployment. If Vercel labels the environment differently, adjust the
    # `contains(...)` check (the manual dispatch path still works regardless).
    if: >-
      ${{ github.event_name == 'workflow_dispatch' ||
          (github.event.deployment_status.state == 'success' &&
           contains(github.event.deployment_status.environment, 'roduction')) }}
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Post-deploy smoke tests
        run: npx playwright test --project=smoke
        env:
          # NOTE: do not use deployment_status.environment_url here - Vercel reports
          # the per-deployment URL, which has Deployment Protection and returns 401
          # to anonymous requests. Smoke the public alias instead; by the time the
          # deployment_status fires, the alias already points at this deployment.
          PRODUCTION_URL: ${{ inputs.url || 'https://www.updatewave.org' }}
