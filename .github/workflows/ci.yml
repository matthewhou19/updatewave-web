name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # Fast, reliable merge gate: typecheck, lint, unit/integration tests, and the
  # production build. This is the job that branch protection requires (context
  # name: "quality"). It must stay green and fast - no browser installs here.
  quality:
    name: quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit + Integration tests
        run: npm test

      - name: Build
        run: npm run build

  # E2E runs against an ephemeral local Supabase (started via the Supabase CLI and
  # seeded with scripts/db-init.sh) - the same stack developers run locally. This
  # makes the suite self-contained and deterministic: no shared/prod database and
  # no missing-seed-data failures. It runs on the host (not a container) because
  # `supabase start` needs Docker.
  #
  # NOT a required check: E2E/infra flakiness must not block merges. `quality` is
  # the gate.
  e2e:
    name: e2e
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality
    env:
      # Supabase comes from the local stack via .env.local (see "Configure local
      # env"). Stripe stays in test mode from secrets; a shell/job env var
      # overrides the blank STRIPE_* values in .env.example.
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        timeout-minutes: 8
        run: |
          # Stop the runner's background apt job, which can hold the dpkg lock and
          # make `--with-deps` hang. The step timeout bounds it either way.
          sudo systemctl stop unattended-upgrades.service 2>/dev/null || true
          npx playwright install --with-deps chromium

      - name: Configure local env (Supabase points at the local stack)
        run: cp .env.example .env.local

      - name: Start local Supabase
        run: npx supabase start

      - name: Apply schema + migrations + seed
        run: bash scripts/db-init.sh --drop

      - name: E2E tests
        run: npx playwright test --project=chromium

      - name: Stop local Supabase
        if: always()
        run: npx supabase stop || true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
