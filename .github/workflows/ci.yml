name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # Fast, reliable merge gate: typecheck, lint, unit/integration tests, and the
  # production build. This is the job that branch protection requires (context
  # name: "quality"). It must stay green and fast - no browser installs here.
  quality:
    name: quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit + Integration tests
        run: npm test

      - name: Build
        run: npm run build

  # E2E runs inside the official Playwright container, so browsers and their
  # system dependencies are pre-installed. This removes the
  # `playwright install --with-deps` step that previously hung on apt and
  # tripped the 10-minute job timeout.
  #
  # Keep the image tag in sync with the @playwright/test version in package.json.
  # This job is intentionally NOT a required check: E2E infra flakiness must not
  # block merges. The `quality` job above is the gate.
  e2e:
    name: e2e
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quality
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
    env:
      HAS_SECRETS: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL != '' }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: E2E tests
        if: env.HAS_SECRETS == 'true'
        run: npx playwright test --project=chromium

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ failure() && env.HAS_SECRETS == 'true' }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
